<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Dr. Savita Kumari</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
      color: #134e4a;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #0f766e;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
      color: #5f6368;
    }
    .retry-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #0f766e; }
    .emergency {
      margin-top: 32px;
      padding: 16px;
      background: white;
      border-radius: 12px;
      border: 1px solid #99f6e4;
    }
    .emergency p { margin-bottom: 8px; font-size: 14px; }
    .emergency a { color: #0d9488; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    <div class="emergency">
      <p><strong>Emergency?</strong></p>
      <p>Call: <a href="tel:+916204309476">+91 620 430 9476</a></p>
    </div>
  </div>
</body>
</html>
